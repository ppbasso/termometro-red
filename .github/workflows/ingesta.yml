name: Pipeline Termometro RED

on:
  schedule:
    # Se ejecuta cada 1 hora (Cron syntax)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  ejecutar-ingesta:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Script de Ingesta
        env:
          # Inyectamos el secreto de GitHub a la variable de entorno que lee Python
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ingesta.py
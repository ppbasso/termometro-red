name: Francotirador de Ingesta (Stealth)

on:
  schedule:
    # Se ejecuta cada 10 minutos para proteger la cuota de GitHub y evitar baneos
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  ejecutar-ingesta:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Script de Ingesta (Stealth)
        run: python ingesta.py